# docker-compose.yml
#
# Brings up the full app-ai stack:
#   app-ai  — FastAPI agent service (this repo)
#   milvus  — vector database for RAG knowledge_base + user_memory
#   ollama  — local LLM server that serves the BGE-M3 embedding model
#
# EMBEDDING MODE — choose one before starting:
#
#   Mode A: FlagEmbedding (default, current implementation)
#     BGE-M3 runs inside the app-ai container via PyTorch.
#     The ollama service is still started but not used by the app.
#     Model weights are cached in the bge_m3_cache volume (~2.3 GB).
#     No code changes needed.
#
#   Mode B: Ollama (lighter app-ai container, future migration path)
#     app-ai calls Ollama's HTTP API for embeddings instead of loading
#     the model in-process. Requires updating src/rag/embeddings.py.
#     See docs/agent-rag-embeddings.md for the Ollama variant code.
#
# QUICK START:
#   cp .env.example .env        # fill in ANTHROPIC_API_KEY
#   docker compose up -d        # starts all services
#   docker compose logs -f app-ai  # watch startup (BGE-M3 load takes ~60s)
#
# MILVUS CONFIG FILES (required by milvus service):
#   Run once to generate before `docker compose up`:
#   bash standalone_embed.sh start && bash standalone_embed.sh stop
#   This creates embedEtcd.yaml and user.yaml in the current directory.

services:

  # ── app-ai: FastAPI agent service ─────────────────────────────────────────────
  app-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-ai
    ports:
      - "8000:8000"     # expose for NestJS and local testing only
                        # in production, route through Nginx — never expose publicly
    environment:
      # ── Required ──────────────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # ── Claude model override (optional) ──────────────────────────────────────
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}

      # ── Anthropic proxy (optional, for internal gateway / on-prem) ────────────
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}

      # ── Milvus — connects to the milvus service below ─────────────────────────
      # Uses the Docker service name "milvus" as the hostname (Docker DNS).
      MILVUS_URI: http://milvus:19530
      MILVUS_TOKEN: root:Milvus

      # ── Web search (optional) ─────────────────────────────────────────────────
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}

      # ── Ollama endpoint (for Mode B — Ollama embeddings) ──────────────────────
      # Uncomment and update src/rag/embeddings.py to switch from FlagEmbedding.
      # OLLAMA_BASE_URL: http://ollama:11434

    volumes:
      # BGE-M3 model cache — persists across container restarts.
      # snapshot_download() writes here on first start (~2.3 GB download, one-time).
      # On subsequent starts, the model loads from this volume in ~10s.
      - bge_m3_cache:/home/appuser/.cache/modelscope

    depends_on:
      milvus:
        condition: service_healthy   # wait for Milvus to pass its health check
      ollama:
        condition: service_healthy   # wait for Ollama API to be ready
      ollama-init:
        condition: service_completed_successfully  # wait for BGE-M3 pull to finish

    restart: unless-stopped

  # ── milvus: vector database ───────────────────────────────────────────────────
  # Standalone mode — single-node Milvus with embedded etcd and local storage.
  # Same version as standalone_embed.sh (v2.6.11) for consistency.
  #
  # Stores two collections:
  #   knowledge_base — RAG document chunks (shared across all users)
  #   user_memory    — per-user long-term memory (filtered by user_id)
  milvus:
    image: milvusdb/milvus:v2.6.11
    container_name: milvus-standalone
    command: milvus run standalone
    security_opt:
      - seccomp:unconfined    # required by Milvus embedded etcd on Linux
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      ETCD_CONFIG_PATH: /milvus/configs/embedEtcd.yaml
      COMMON_STORAGETYPE: local
      DEPLOY_MODE: STANDALONE
    ports:
      - "19530:19530"   # gRPC — pymilvus connects here
      - "9091:9091"     # HTTP management API + health endpoint
    volumes:
      - milvus_data:/var/lib/milvus
      # Config files generated by standalone_embed.sh — run it once before compose up.
      - ./embedEtcd.yaml:/milvus/configs/embedEtcd.yaml
      - ./user.yaml:/milvus/configs/user.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 90s   # Milvus takes ~60s to initialise embedded etcd
      retries: 3
    restart: unless-stopped

  # ── ollama: local LLM + embedding server ──────────────────────────────────────
  # Serves BGE-M3 embeddings via REST API at http://ollama:11434.
  #
  # Used by app-ai in Mode B (Ollama embeddings).
  # In Mode A (FlagEmbedding), this service is still started but not called by
  # the app — you can comment it out along with ollama-init if not needed.
  #
  # API endpoint for embeddings:
  #   POST http://ollama:11434/api/embeddings
  #   {"model": "bge-m3", "prompt": "your text here"}
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"   # expose for local testing and app-ai access
    volumes:
      # Model weights persist across restarts (~2.3 GB for bge-m3).
      # Docker pulls the model once via ollama-init; subsequent starts load from here.
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

  # ── ollama-init: pull BGE-M3 into ollama on first run ────────────────────────
  # This one-shot service runs after ollama is healthy and pulls the BGE-M3 model.
  # On subsequent `docker compose up` calls, the model already exists in the
  # ollama_data volume — ollama pull is a no-op (instant).
  #
  # OLLAMA_HOST tells the Ollama CLI to connect to the sibling service, not localhost.
  # restart: "no" ensures this service runs once and exits — it is not restarted.
  ollama-init:
    image: ollama/ollama
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "bge-m3"]
    restart: "no"

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  milvus_data:
    # Milvus vector store — knowledge_base + user_memory collections.
    # Delete to reset all stored documents and memories:
    #   docker compose down -v

  ollama_data:
    # Ollama model weights — bge-m3 (~2.3 GB).
    # Shared between ollama and ollama-init services.

  bge_m3_cache:
    # ModelScope cache for BGE-M3 used by FlagEmbedding (Mode A).
    # Mounted into /home/appuser/.cache/modelscope inside app-ai.
    # Model downloads once on first start; reused on every subsequent restart.
