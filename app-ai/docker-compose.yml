# docker-compose.yml
#
# Brings up the full app-ai stack:
#   app-ai  — FastAPI agent service (this repo)
#   etcd    — metadata store for Milvus (external, production-ready)
#   minio   — object storage for Milvus (S3-compatible, production-ready)
#   milvus  — vector database for RAG knowledge_base + user_memory
#
# EMBEDDING MODE: FlagEmbedding (Mode A)
#   BGE-M3 runs inside the app-ai container via PyTorch.
#   Model weights are cached in the bge_m3_cache volume (~2.3 GB).
#
# QUICK START:
#   cp .env.example .env        # fill in ANTHROPIC_API_KEY
#   docker compose up -d        # starts all services
#   docker compose logs -f app-ai  # watch startup (BGE-M3 load takes ~60s)

services:
  # ── app-ai: FastAPI agent service ─────────────────────────────────────────────
  app-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app-ai
    ports:
      - "8000:8000" # expose for NestJS and local testing only
        # in production, route through Nginx — never expose publicly
    environment:
      # ── Required ──────────────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

      # ── Claude model override (optional) ──────────────────────────────────────
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}

      # ── Anthropic proxy (optional, for internal gateway / on-prem) ────────────
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}

      # ── Milvus — connects to the milvus service below ─────────────────────────
      # Uses the Docker service name "milvus" as the hostname (Docker DNS).
      MILVUS_URI: http://milvus:19530
      MILVUS_TOKEN: root:Milvus

      # ── Web search (optional) ─────────────────────────────────────────────────
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}

    volumes:
      # BGE-M3 model cache — persists across container restarts.
      # snapshot_download() writes here on first start (~2.3 GB download, one-time).
      # On subsequent starts, the model loads from this volume in ~10s.
      - bge_m3_cache:/home/appuser/.cache/modelscope

    depends_on:
      milvus:
        condition: service_healthy # wait for Milvus to pass its health check

    restart: unless-stopped

  # ── etcd: metadata store for Milvus ───────────────────────────────────────────
  # External etcd — more reliable than embedded etcd for production use.
  # Milvus uses etcd to store collection metadata, indexes, and cluster state.
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── minio: object storage for Milvus ──────────────────────────────────────────
  # MinIO stores Milvus segment data and index files (S3-compatible API).
  # Replaces local filesystem storage used in the embedded etcd approach.
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001" # MinIO web console (http://localhost:9001)
      - "9000:9000" # MinIO S3 API
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── milvus: vector database ───────────────────────────────────────────────────
  # Standalone mode — uses external etcd + MinIO (production-ready).
  # Same version as standalone_embed.sh (v2.6.11) for consistency.
  #
  # Stores two collections:
  #   knowledge_base — RAG document chunks (shared across all users)
  #   user_memory    — per-user long-term memory (filtered by user_id)
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.11
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined # required by Milvus on Linux
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    ports:
      - "19530:19530" # gRPC — pymilvus connects here
      - "9091:9091" # HTTP management API + health endpoint
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      start_period: 90s # Milvus takes ~60s to initialise
      retries: 3
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  etcd_data:
    # etcd metadata — Milvus collection schemas, index configs, cluster state.

  minio_data:
    # MinIO object storage — Milvus segment data and index files.

  milvus_data:
    # Milvus runtime data.
    # Delete to reset all stored documents and memories:
    #   docker compose down -v

  bge_m3_cache:
    # ModelScope cache for BGE-M3 used by FlagEmbedding (Mode A).
    # Mounted into /home/appuser/.cache/modelscope inside app-ai.
    # Model downloads once on first start; reused on every subsequent restart.
